services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edja_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edja_password}
      POSTGRES_DB: ${POSTGRES_DB:-edja_wallet}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Initialize the database on first run
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  server:
    build: ./server
    environment:
      DB_USER: ${POSTGRES_USER:-edja_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-edja_password}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-edja_wallet}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-Edja Wallet <no-reply@edjawallet.local>}
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-/api}
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
