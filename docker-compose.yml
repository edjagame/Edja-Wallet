version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edja_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edja_password}
      POSTGRES_DB: ${POSTGRES_DB:-edja_wallet}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Initialize the database on first run
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      DB_USER: ${POSTGRES_USER:-edja_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-edja_password}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-edja_wallet}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key}
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      - db
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5000}
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
